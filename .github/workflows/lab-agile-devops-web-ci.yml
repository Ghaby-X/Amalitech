name: Web CI

on:
  push:
    branches: [lab-agile-devops]
    paths:
      - 'agile-devops-lab/web/**'
  pull_request:
    branches: [lab-agile-devops]
    paths:
      - 'agile-devops-lab/web/**'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agile-devops-lab/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: agile-devops-lab/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
